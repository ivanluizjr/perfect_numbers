name: perfect_numbers
description: "A Flutter app to explore perfect numbers — check if a number is perfect and find all perfect numbers in a range."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Dependency Injection
  get_it: ^9.2.1

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.7

  # Local Storage
  shared_preferences: ^2.5.2

  # Unique IDs
  uuid: ^4.5.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_perfect_number.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D2417"
  image: "assets/images/icon_perfect_number.png"
  android: true
  ios: true
  android_12:
    color: "#0D2417"
    image: "assets/images/icon_perfect_number.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

